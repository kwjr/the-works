    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Row 1 — gray bar -->
  <rect x="158" y="111" width="236" height="22" rx="11" fill="#1f2937"/>

  <!-- Row 2 — green checkbox -->
  <rect x="78" y="178" width="64" height="64" rx="14" fill="#22c55e"/>
  <polyline points="92,210 109,227 135,194"
    fill="none" stroke="#fff" stroke-width="9"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Row 2 — shorter gray bar -->
  <rect x="158" y="199" width="178" height="22" rx="11" fill="#1f2937"/>

  <!-- Badge — green square, lower right -->
